# verify_contracts.yaml
# External configuration for A/G contract verification of the grid-world NSBT.
# See verify_contracts.py for the contract schema and class index mapping.

# Grid boundaries (inclusive). The NN was trained on x, y in [grid_min, grid_max].
grid:
  min: 0
  max: 6

# Number of NN output classes (We=0, Ea=1, No=2, So=3, XX=4).
num_classes: 5

# Verification parameters
verification:
  # ε-ball radius around each integer input point. Must be tiny (<<0.5) so
  # CROWN performs essentially a point-check at each integer coordinate.
  eps: 0.001
  # BaB timeout in seconds per sub-verification.
  timeout_sec: 300

# File paths (relative to the directory where the script is run).
onnx_path: ./networks/1000__6_18_0__0200_1.onnx
output_path: ./contract_results.json

# Obstacle positions [x, y] from template.tree.
# Stored as a flat array in the DSL (index 2k = x, index 2k+1 = y).
obstacles:
  - [0, 0]
  - [0, 1]
  - [1, 0]
  - [1, 1]
  - [1, 2]
  - [1, 4]
  - [1, 6]
  - [2, 1]
  - [2, 4]
  - [2, 6]
  - [3, 3]
  - [3, 6]
  - [4, 1]
  - [4, 2]
  - [5, 5]
  - [6, 1]
  - [6, 2]
  - [6, 3]
